<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinPro">
<title>FinPro — PWA SaaS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<!-- PWA MANIFEST inline para demo -->
<script>
const manifest = {
  name: 'FinPro — Finanças Pessoais',
  short_name: 'FinPro',
  description: 'Controle financeiro inteligente',
  theme_color: '#0f1117',
  background_color: '#0f1117',
  display: 'standalone',
  start_url: '/',
  icons: [{ src: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%231D9E75"/><text y=".9em" font-size="80" x="10">💰</text></svg>', sizes: '192x192', type: 'image/svg+xml' }]
}
const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' })
const link = document.createElement('link')
link.rel = 'manifest'; link.href = URL.createObjectURL(blob)
document.head.appendChild(link)
</script>

<style>
/* ════════════════════════════════ TOKENS */
:root {
  --green:#1D9E75; --green-bg:rgba(29,158,117,.12);
  --blue:#3b82f6;  --blue-bg:rgba(59,130,246,.12);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.12);
  --red:#ef4444;   --red-bg:rgba(239,68,68,.12);
  --purple:#a855f7;--purple-bg:rgba(168,85,247,.12);
  --pink:#D4537E;  --pink-bg:rgba(212,83,126,.12);
  --bg:#0f1117; --bg2:#161b27; --bg3:#1e2535;
  --border:rgba(255,255,255,.06); --border2:rgba(255,255,255,.12);
  --text:#f1f5f9; --text2:#94a3b8; --text3:#475569;
  --radius:12px; --radius-sm:8px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --font-d:'Syne',sans-serif; --font-b:'DM Sans',sans-serif;
  --sidebar-w:220px; --bottom-h:64px; --safe-b:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
#app{display:flex;min-height:100vh;min-height:100dvh;}
button{font-family:var(--font-b);cursor:pointer;}
input,select{font-family:var(--font-b);}
a{color:var(--green);text-decoration:none;}

/* ════════════════════════════════ AUTH */
.auth-wrapper{width:100%;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:1rem;position:relative;overflow:hidden;}
.auth-bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(29,158,117,.18) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 80%,rgba(59,130,246,.12) 0%,transparent 60%),var(--bg);z-index:0;}
.auth-card{position:relative;z-index:1;width:100%;max-width:420px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:20px;padding:2rem;box-shadow:var(--shadow);}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:1.75rem;}
.auth-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--green),#0d7a5a);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;flex-shrink:0;}
.auth-brand{font-family:var(--font-d);font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.5px;}
.auth-tagline{font-size:11px;color:var(--text3);}
.auth-tabs{display:flex;background:var(--bg3);border-radius:var(--radius-sm);padding:3px;margin-bottom:1.5rem;}
.auth-tab{flex:1;padding:8px;border:none;background:none;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);transition:all .2s;}
.auth-tab.active{background:var(--bg2);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.25);}
.auth-error{font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:12px;}
.auth-terms{font-size:11px;color:var(--text3);margin-top:.75rem;text-align:center;}
.install-banner{display:flex;align-items:center;gap:8px;background:var(--green-bg);border:0.5px solid var(--green);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--green);margin-top:1rem;}
.btn-install{margin-left:auto;background:var(--green);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:600;}

/* KIWIFY CTA */
.kiwify-cta{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,var(--bg3),var(--bg2));border:0.5px solid var(--green);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.kiwify-cta::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(29,158,117,.08),transparent);pointer-events:none;}
.kiwify-cta:hover{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.15);transform:translateY(-1px);}
.kiwify-cta-left{flex:1;}
.kiwify-cta-right{text-align:right;flex-shrink:0;}

/* ════════════════════════════════ SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);border-right:0.5px solid var(--border);height:100vh;height:100dvh;position:sticky;top:0;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;transition:width .25s,min-width .25s;flex-shrink:0;z-index:40;}
.sidebar.collapsed{width:60px;min-width:60px;}
.sidebar.collapsed .sb-logo-text,.sidebar.collapsed .sb-mes span,.sidebar.collapsed .sb-item>span,.sidebar.collapsed .sb-badge,.sidebar.collapsed .sb-plan{opacity:0;pointer-events:none;width:0;overflow:hidden;}
.sb-logo{display:flex;align-items:center;gap:10px;padding:1.1rem 1rem;border-bottom:0.5px solid var(--border);overflow:hidden;white-space:nowrap;}
.sb-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--green),#0d7a5a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;flex-shrink:0;}
.sb-brand{font-family:var(--font-d);font-size:14px;font-weight:800;color:var(--text);display:block;}
.sb-user{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;display:block;}
.sb-collapse{background:none;border:none;color:var(--text3);font-size:16px;margin-left:auto;padding:4px;flex-shrink:0;transition:color .15s;}
.sb-collapse:hover{color:var(--text);}
.sb-mes{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;border-bottom:0.5px solid var(--border);font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;}
.sb-mes button{background:none;border:none;color:var(--text3);font-size:14px;padding:2px 4px;transition:color .15s;}
.sb-mes button:hover{color:var(--text);}
.sb-nav{flex:1;padding:.5rem 0;}
.sb-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 1rem;background:none;border:none;border-left:3px solid transparent;font-size:13px;color:var(--text2);text-align:left;white-space:nowrap;overflow:hidden;transition:all .15s;position:relative;}
.sb-item i{font-size:16px;flex-shrink:0;width:20px;text-align:center;}
.sb-item:hover{background:var(--bg3);color:var(--text);}
.sb-item.active{background:var(--green-bg);color:var(--green);border-left-color:var(--green);}
.sb-badge{margin-left:auto;font-size:10px;padding:1px 6px;border-radius:99px;background:var(--red-bg);color:var(--red);font-weight:700;flex-shrink:0;}
.sb-footer{border-top:0.5px solid var(--border);padding:.5rem 0;}
.sb-plan{font-size:10px;color:var(--text3);text-align:center;padding:4px 1rem;white-space:nowrap;overflow:hidden;}

/* ════════════════════════════════ MAIN */
.main-content{flex:1;min-width:0;height:100vh;height:100dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page-wrap{max-width:1100px;margin:0 auto;padding:1.25rem 1rem 2rem;}

/* ════════════════════════════════ BOTTOM NAV */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:calc(var(--bottom-h) + var(--safe-b));background:var(--bg2);border-top:0.5px solid var(--border);z-index:50;padding-bottom:var(--safe-b);}
.bn-item{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:3px;background:none;border:none;color:var(--text3);font-size:9px;font-weight:500;padding:8px 4px;transition:color .15s;position:relative;}
.bn-item i{font-size:20px;}
.bn-item.active{color:var(--green);}
.bn-badge{position:absolute;top:6px;right:calc(50% - 14px);background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 4px;}

/* FAB */
.fab{position:fixed;bottom:calc(var(--bottom-h) + var(--safe-b) + 16px);right:20px;width:52px;height:52px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:22px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(29,158,117,.45);z-index:45;transition:transform .15s,box-shadow .15s;}
.fab:hover{transform:scale(1.08);}
.fab.listening{animation:pulse 1s ease-in-out infinite;background:var(--red);}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}

/* ════════════════════════════════ COMPONENTS */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px;padding-bottom:1rem;border-bottom:0.5px solid var(--border);}
.page-header h2{font-family:var(--font-d);font-size:18px;font-weight:700;display:flex;align-items:center;gap:10px;}
.page-header p{font-size:12px;color:var(--text3);margin-top:2px;}
.mes-nav{display:flex;align-items:center;gap:6px;background:var(--bg3);border-radius:var(--radius-sm);padding:4px 6px;}
.mes-nav button{background:none;border:none;color:var(--text3);font-size:14px;padding:4px 6px;border-radius:4px;transition:all .15s;}
.mes-nav button:hover{background:var(--bg2);color:var(--text);}
.mes-nav span{font-size:13px;font-weight:500;color:var(--text);min-width:120px;text-align:center;}
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:1rem;}
.card-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:.85rem;text-transform:uppercase;letter-spacing:.5px;}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem;}
.metric-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:.9rem 1rem;position:relative;overflow:hidden;}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
.metric-card.green::before{background:var(--green);}
.metric-card.blue::before{background:var(--blue);}
.metric-card.amber::before{background:var(--amber);}
.metric-card.red::before{background:var(--red);}
.mc-label{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:.4rem;display:flex;align-items:center;gap:5px;}
.mc-value{font-family:var(--font-d);font-size:20px;font-weight:700;color:var(--text);margin-bottom:.2rem;}
.mc-sub{font-size:11px;color:var(--text3);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.score-ring{position:relative;width:80px;height:80px;flex-shrink:0;}
.score-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:22px;font-weight:700;}
.alert-box{display:flex;align-items:flex-start;gap:8px;padding:10px 12px;border-radius:var(--radius-sm);font-size:12px;}
.alert-box.ok{background:var(--green-bg);border:0.5px solid var(--green);color:var(--green);}
.alert-box.danger{background:var(--red-bg);border:0.5px solid var(--red);color:var(--red);}
.alert-box i{font-size:16px;flex-shrink:0;margin-top:1px;}
.venc-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:12px;}
.venc-row:last-child{border-bottom:none;}
.dias-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;}
.dias-chip.hoje{background:var(--red-bg);color:var(--red);}
.dias-chip.urgente{background:var(--amber-bg);color:var(--amber);}
.dias-chip.ok{background:var(--green-bg);color:var(--green);}
.prog-bar{height:5px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);font-weight:600;padding:0 0 8px;border-bottom:0.5px solid var(--border);text-align:left;}
.data-table td{padding:8px 0;border-bottom:0.5px solid var(--border);color:var(--text2);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table td.empty{color:var(--text3);font-size:12px;padding:16px 0;text-align:center;}
.badge{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600;margin-left:4px;}
.b-green{background:var(--green-bg);color:var(--green);}
.b-blue{background:var(--blue-bg);color:var(--blue);}
.b-amber{background:var(--amber-bg);color:var(--amber);}
.b-red{background:var(--red-bg);color:var(--red);}
.b-purple{background:var(--purple-bg);color:var(--purple);}
.b-pink{background:var(--pink-bg);color:var(--pink);}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);font-weight:500;}
.field input,.field select{background:var(--bg3);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:7px 10px;font-size:13px;color:var(--text);outline:none;width:100%;transition:border-color .15s;}
.field input:focus,.field select:focus{border-color:var(--green);}
.field input::placeholder{color:var(--text3);}
.form-inline{display:grid;gap:8px;align-items:end;}
.btn-primary{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;font-weight:500;transition:opacity .15s;white-space:nowrap;}
.btn-primary:hover{opacity:.88;}
.btn-primary.full{width:100%;justify-content:center;padding:11px;font-size:14px;font-weight:600;margin-bottom:8px;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-secondary{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap;}
.btn-secondary:hover{background:var(--bg2);color:var(--text);}
.btn-ghost{display:block;width:100%;background:none;border:none;color:var(--text3);font-size:13px;padding:8px;text-align:center;}
.btn-ghost:hover{color:var(--text);}
.btn-danger{display:inline-flex;align-items:center;gap:6px;background:var(--red-bg);color:var(--red);border:0.5px solid var(--red);border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;font-weight:500;}
.btn-danger:hover{background:var(--red);color:#fff;}
.btn-del{background:none;border:none;color:var(--text3);font-size:14px;padding:3px 5px;border-radius:4px;}
.btn-del:hover{color:var(--red);background:var(--red-bg);}
.btn-ok{background:var(--green-bg);border:none;color:var(--green);font-size:13px;padding:3px 7px;border-radius:4px;}
.btn-ok:hover{background:var(--green);color:#fff;}
.toggle-status{font-size:11px;padding:3px 10px;border-radius:99px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text3);}
.toggle-status.on{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.link-btn{background:none;border:none;color:var(--green);font-size:13px;cursor:pointer;}
.toggle-sm{position:relative;display:inline-block;width:36px;height:20px;cursor:pointer;flex-shrink:0;}
.toggle-sm input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;background:var(--bg3);border:0.5px solid var(--border2);border-radius:99px;transition:.2s;}
.toggle-track::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:2px;background:#fff;border-radius:50%;transition:.2s;}
.toggle-sm input:checked+.toggle-track{background:var(--green);border-color:var(--green);}
.toggle-sm input:checked+.toggle-track::before{transform:translateX(16px);}
.renda-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.renda-total{padding:10px 0 0;font-size:13px;color:var(--text2);border-top:0.5px solid var(--border);margin-top:4px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;margin-bottom:1rem;}
.cartao-visual-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem;}
.cartao-add-card{background:var(--bg2);border:0.5px dashed var(--border2);border-radius:var(--radius);padding:1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--text3);font-size:13px;min-height:130px;}
.cartao-add-card i{font-size:28px;}
.cartao-add-card:hover{border-color:var(--green);color:var(--green);background:var(--green-bg);}
.config-section{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1rem;}
.config-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--border);font-size:13px;gap:12px;}
.config-row:last-child{border-bottom:none;}
.config-row label{color:var(--text2);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px);}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:16px;padding:1.5rem;width:100%;max-width:460px;box-shadow:var(--shadow);}
.modal h3{font-family:var(--font-d);font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:.5rem;}
.modal p{font-size:13px;color:var(--text2);margin-bottom:1rem;}
.modal .field{margin-bottom:.75rem;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:1.25rem;}
.btn-cancel{background:var(--bg3);border:0.5px solid var(--border2);color:var(--text2);border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;}
.btn-confirm{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:600;}
.loading-spinner{display:flex;align-items:center;justify-content:center;gap:10px;padding:3rem;font-size:14px;color:var(--text3);}
.spin{animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.pwa-install-bar{position:fixed;bottom:calc(var(--bottom-h) + var(--safe-b) + 80px);left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;background:var(--bg2);border:0.5px solid var(--green);border-radius:99px;padding:8px 16px;font-size:12px;color:var(--text2);box-shadow:var(--shadow);z-index:44;white-space:nowrap;}
.pwa-install-bar button{background:var(--green);color:#fff;border:none;border-radius:99px;padding:4px 12px;font-size:12px;font-weight:600;}

/* ════════════════════════════════ MOBILE */
@media(max-width:900px){
  .sidebar{display:none;}
  .bottom-nav{display:flex;}
  .fab{bottom:calc(var(--bottom-h) + var(--safe-b) + 12px);}
  .main-content{padding-bottom:calc(var(--bottom-h) + var(--safe-b) + 8px);}
  .page-wrap{padding:1rem .75rem;}
  .metrics-grid{grid-template-columns:repeat(2,1fr);gap:8px;}
  .mc-value{font-size:17px;}
  .grid2{grid-template-columns:1fr;}
  .form-inline{grid-template-columns:1fr 1fr!important;}
  .form-inline>*:last-child{grid-column:1/-1;}
  .cards-grid{grid-template-columns:1fr;}
  .page-header{flex-direction:column;align-items:flex-start;gap:8px;}
}
@media(max-width:480px){
  .metrics-grid{grid-template-columns:repeat(2,1fr);}
  .mc-value{font-size:15px;}
  .card{padding:.85rem .9rem;}
}
</style>

// ══════════════════════════════════════════════════════════
// CÁLCULOS
// ══════════════════════════════════════════════════════════
function calcTotais(){
  const totalR = state.rendas.reduce((s,r)=>s+r.valor,0)
  const totalF = state.fixas.filter(f=>f.ativo).reduce((s,f)=>s+myVal(f,f.valor),0)
  const totalV = state.variaveis.reduce((s,c)=>s+myVal(c,c.valor),0)
  const totalL = state.lancamentos.reduce((s,l)=>s+myVal(l,l.valor),0)
  return { totalR, totalF, totalV, totalL, saldo: totalR-totalF-totalV-totalL }
}

function calcScore(){
  const { totalR, totalF, totalV, totalL } = calcTotais()
  if(totalR===0) return { score:0, label:'Sem dados', cor:'#6b7280' }
  const comp = (totalF+totalV+totalL)/totalR
  const atrasadas = state.variaveis.filter(c=>c.status==='atrasado').length
  let score = 100
  if(comp>0.9) score-=40; else if(comp>0.8) score-=25; else if(comp>0.7) score-=15; else if(comp>0.6) score-=8
  score -= atrasadas*12
  score = Math.max(0, Math.min(100, Math.round(score)))
  const label = score>=80?'Excelente 🏆':score>=65?'Bom 👍':score>=45?'Atenção ⚠️':'Crítico 🚨'
  const cor   = score>=80?'#1D9E75':score>=65?'#3b82f6':score>=45?'#f59e0b':'#ef4444'
  return { score, label, cor, comp }
}

function getVencProximos(){
  const hoje = new Date(); hoje.setHours(0,0,0,0)
  const lim  = new Date(hoje); lim.setDate(hoje.getDate()+7)
  const items = []
  state.variaveis.filter(c=>c.status!=='pago').forEach(c=>{
    const d = new Date(c.data+'T12:00:00')
    if(d>=hoje&&d<=lim) items.push({desc:c.desc,valor:myVal(c,c.valor),dias:Math.round((d-hoje)/86400000),tipo:'variável'})
  })
  state.fixas.filter(f=>f.ativo).forEach(f=>{
    const dV = new Date(hoje.getFullYear(),hoje.getMonth(),f.dia)
    if(dV<hoje) dV.setMonth(dV.getMonth()+1)
    const dias = Math.round((dV-hoje)/86400000)
    if(dias<=7) items.push({desc:f.desc,valor:myVal(f,f.valor),dias,tipo:'fixa'})
  })
  return items.sort((a,b)=>a.dias-b.dias)
}

async function startVoice(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    alert('Reconhecimento de voz não suportado neste navegador.\nUse Chrome no Android/Desktop.'); return
  }
  const btn=document.getElementById('voice-btn'); btn.classList.add('listening')
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition
  const rec=new SR(); rec.lang='pt-BR'; rec.continuous=false; rec.interimResults=false
  rec.onresult=(e)=>{
    btn.classList.remove('listening')
    const texto=e.results[0][0].transcript
    document.getElementById('voice-texto-original').textContent=`"${texto}"`
    const match=texto.match(/(\d+(?:[.,]\d{1,2})?)/)
    document.getElementById('voice-valor').value=match?parseFloat(match[1].replace(',','.')):0
    document.getElementById('voice-desc').value=texto.replace(/(\d+(?:[.,]\d{1,2})?)/,'').replace(/reais?|r\$/gi,'').trim()||texto
    document.getElementById('voice-modal').classList.add('show')
  }
  rec.onerror=()=>btn.classList.remove('listening')
  rec.start()
}

function confirmVoice(){
  const desc =document.getElementById('voice-desc').value
  const valor=parseFloat(document.getElementById('voice-valor').value)||0
  const hoje =new Date().toISOString().split('T')[0]
  state.variaveis.push({ id:uid(), desc, data:hoje, valor, parcelas:1, casal:false, status:'pendente' })
  document.getElementById('voice-modal').classList.remove('show')
  render()
}

async function enableNotifications(){
  if(!('Notification' in window)){ alert('Notificações não suportadas.'); return }
  const p=await Notification.requestPermission()
  if(p==='granted'){
    new Notification('FinPro ativado! 🎉',{ body:'Você receberá alertas de vencimentos próximos.', icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%231D9E75"/><text y=".9em" font-size="80" x="10">💰</text></svg>' })
    alert('✅ Notificações ativadas!')
  } else { alert('Permissão negada. Ative nas configurações do navegador.') }
}

async function installPWA(){
  if(!state.installPrompt){ alert('Para instalar:\n📱 Android (Chrome): Menu ⋮ → "Adicionar à tela inicial"\n🍎 iPhone (Safari): Botão Compartilhar → "Adicionar à Tela de Início"'); return }
  state.installPrompt.prompt()
  await state.installPrompt.userChoice
  state.installPrompt=null
}

function render(){
  const app=document.getElementById('app')
  if(!app) return
  // Não logado → tela de auth/vendas
  if(!state.user){ app.innerHTML=renderAuth(); return }
  // Logado mas sem plano ativo → tela de bloqueio

// ── ADMIN FUNCTIONS ───────────────────────────────────────
let adminUsers = []

function checkAdminPw(){
  const pw = document.getElementById('admin-pw')?.value
  const err = document.getElementById('admin-pw-err')
  if(pw === ADMIN_SECRET){
    // Marca como admin temporariamente na sessão
    if(state.profile) state.profile.is_admin = true
    navTo('admin')
  } else {
    if(err){ err.style.display='block'; err.textContent='Senha incorreta.' }
    document.getElementById('admin-pw').value = ''
  }
}

function navToAdmin(){
  state.page = 'admin'
  renderPage()
  document.getElementById('main-content')?.scrollTo(0,0)
}

async function loadAdminData(){
  const tbody = document.getElementById('admin-tbody')
  if(!tbody) return

  try {
    // Busca todos os usuários via view admin
    const { data, error } = await _supa
      .from('admin_usuarios')
      .select('*')
      .order('created_at', { ascending: false })

    if(error) throw error
    adminUsers = data || []
    renderAdminMetrics()
    renderAdminTabela(adminUsers)
  } catch(e) {
    // Fallback: busca profiles diretamente
    const { data } = await _supa
      .from('profiles')
      .select('*')
      .order('created_at', { ascending: false })
    adminUsers = (data||[]).map(p=>({...p, email: p.kiwify_email||'—'}))
    renderAdminMetrics()
    renderAdminTabela(adminUsers)
  }
}

function renderAdminMetrics(){
  const ativos     = adminUsers.filter(u => u.plano === 'ativo').length
  const cortesias  = adminUsers.filter(u => u.cortesia === true && u.plano === 'ativo').length
  const cancelados = adminUsers.filter(u => u.plano === 'cancelado' || u.plano === 'expirado').length
  const mrr        = (ativos - cortesias) * 19.90

  const set = (id, val) => { const el=document.getElementById(id); if(el) el.textContent=val }
  set('adm-total',     ativos)
  set('adm-mrr',       'R$ '+mrr.toLocaleString('pt-BR',{minimumFractionDigits:2}))
  set('adm-cortesia',  cortesias)
  set('adm-cancelados',cancelados)
}

function renderAdminTabela(users){
  const tbody = document.getElementById('admin-tbody')
  if(!tbody) return
  if(!users.length){ tbody.innerHTML='<tr><td colspan="6" class="empty">Nenhum usuário encontrado.</td></tr>'; return }

  tbody.innerHTML = users.map(u => {
    const statusCls = u.plano==='ativo' ? 'b-green' : u.plano==='pendente' ? 'b-amber' : 'b-red'
    const tipoCls   = u.cortesia ? 'b-purple' : u.is_admin ? 'b-amber' : 'b-blue'
    const tipo      = u.cortesia ? '🎁 Cortesia' : u.is_admin ? '⭐ Admin' : '💳 Pago'
    const desde     = u.assinatura_inicio ? new Date(u.assinatura_inicio).toLocaleDateString('pt-BR') : '—'
    const email     = u.email || '—'
    const nome      = u.nome  || '—'

    return `<tr>
      <td style="font-size:12px;">${email}</td>
      <td style="font-size:12px;">${nome}</td>
      <td><span class="badge ${statusCls}">${u.plano||'pendente'}</span></td>
      <td><span class="badge ${tipoCls}" style="font-size:9px;">${tipo}</span></td>
      <td style="font-size:11px;color:var(--text3);">${desde}</td>
      <td>
        <div style="display:flex;gap:4px;flex-wrap:wrap;">
          ${u.plano !== 'ativo' ? `
            <button class="btn-ok" style="font-size:11px;padding:3px 8px;" onclick="adminAtivar('${u.id}', false)" title="Ativar acesso">
              <i class="ti ti-check"></i> Ativar
            </button>` : ''}
          ${u.plano === 'ativo' && !u.cortesia ? `
            <button class="btn-del" style="font-size:11px;padding:3px 8px;" onclick="adminBloquear('${u.id}')" title="Bloquear acesso">
              <i class="ti ti-ban"></i> Bloquear
            </button>` : ''}
          ${!u.cortesia && u.plano !== 'ativo' ? `
            <button class="btn-secondary" style="font-size:11px;padding:3px 8px;" onclick="adminAtivar('${u.id}', true)" title="Dar cortesia">
              <i class="ti ti-gift"></i>
            </button>` : ''}
        </div>
      </td>
    </tr>`
  }).join('')
}

function filtrarUsuarios(q){
  q = q.toLowerCase()
  const filtrados = q ? adminUsers.filter(u =>
    (u.email||'').toLowerCase().includes(q) ||
    (u.nome||'').toLowerCase().includes(q)
  ) : adminUsers
  renderAdminTabela(filtrados)
}

async function adminAtivar(userId, cortesia){
  const { data, error } = await _supa.rpc('admin_ativar_usuario', {
    p_user_id: userId, p_cortesia: cortesia
  })
  if(error){ alert('Erro: '+error.message); return }
  await loadAdminData()
}

async function adminBloquear(userId){
  if(!confirm('Bloquear acesso deste usuário?')) return
  const { error } = await _supa.rpc('admin_bloquear_usuario', { p_user_id: userId })
  if(error){ alert('Erro: '+error.message); return }
  await loadAdminData()
}

async function darCortesia(){
  const email = document.getElementById('cortesia-email')?.value.trim()
  const nota  = document.getElementById('cortesia-nota')?.value.trim() || 'Acesso cortesia'
  const msg   = document.getElementById('cortesia-msg')
  if(!email){ alert('Digite o e-mail.'); return }

  const { data, error } = await _supa.rpc('admin_cortesia_email', {
    p_email: email, p_notas: nota
  })

  if(error || data?.success === false){
    const txt = error?.message || data?.error || 'Erro desconhecido'
    if(msg){ msg.style.display='block'; msg.style.color='var(--red)'; msg.textContent='❌ '+txt }
    return
  }

  if(msg){ msg.style.display='block'; msg.style.color='var(--green)'; msg.textContent='✅ Cortesia concedida para '+email }
  document.getElementById('cortesia-email').value = ''
  document.getElementById('cortesia-nota').value  = ''
  await loadAdminData()
}


window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); state.installPrompt = e
  const b = document.getElementById('pwa-bar'); if(b) b.style.display='flex'
})

document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return
  if(e.key==='Escape') document.querySelectorAll('.modal-overlay.show').forEach(m=>m.classList.remove('show'))
  const map={'1':'dashboard','2':'fixas','3':'variaveis','4':'cartoes','5':'rendas','6':'relatorios','7':'configuracoes'}
  if(map[e.key]) navTo(map[e.key])
})

// Registra SW
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('data:application/javascript,').catch(()=>{})
}

// Escuta mudanças de auth (login/logout/refresh)
_supa.auth.onAuthStateChange(async (event, session) => {
  if(session?.user){
    state.user = session.user
    await loadAll()
    render()
  } else {
    state.user = null
    render()
  }
})

// Verifica sessão existente ao abrir o app
async function init(){
  render() // mostra tela de loading/auth
  const { data } = await _supa.auth.getSession()
  if(data?.session?.user){
    state.user = data.session.user
    await loadAll()
    render()
  }
}

init()
</script>
